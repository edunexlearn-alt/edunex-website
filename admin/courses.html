<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | Edunex Admin</title>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-brand"><img src="../assets/images/logo.png" alt="Logo">
                <div>
                    <div class="brand">Edunex Academy</div><span class="brand-sub">Admin Panel</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="students.html" class="nav-item"><i class="fas fa-user-graduate"></i> Students</a>
                <a href="courses.html" class="nav-item active"><i class="fas fa-book"></i> Courses</a>
                <div class="nav-section-title" style="margin-top:12px;">Academic</div>
                <a href="tests.html" class="nav-item"><i class="fas fa-clipboard-check"></i> Online Tests</a>
                <a href="fees.html" class="nav-item"><i class="fas fa-rupee-sign"></i> Fee Management</a>
                <div class="nav-section-title" style="margin-top:12px;">Leads</div>
                <a href="enquiries.html" class="nav-item"><i class="fas fa-envelope-open-text"></i> Enquiries</a>
                <div class="nav-section-title" style="margin-top:12px;">Settings</div>
                <a href="../index.html" target="_blank" class="nav-item"><i class="fas fa-globe"></i> View Website</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar" id="sidebarUserInitial">A</div>
                    <div class="info">
                        <div class="name" id="sidebarUserName">Admin</div>
                        <div class="role">Administrator</div>
                    </div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <div class="main-content">
            <header class="top-header">
                <div>
                    <div class="page-title">Course Management</div>
                    <div class="page-subtitle">Manage all offered courses and batches</div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openModal('addCourseModal')">
                        <i class="fas fa-plus"></i> Create Course
                    </button>
                </div>
            </header>

            <div class="page-body">
                <div class="filters-row">
                    <select class="filter-select" id="categoryFilter" onchange="loadCourses()">
                        <option value="">All Categories</option>
                        <option value="academic">Academic (5th-10th)</option>
                        <option value="senior-secondary">Senior Secondary (11th-12th)</option>
                        <option value="computer">Computer & IT</option>
                    </select>
                    <select class="filter-select" id="activeFilter" onchange="loadCourses()">
                        <option value="true">Active Only</option>
                        <option value="false">Inactive Only</option>
                        <option value="">All Courses</option>
                    </select>
                </div>

                <div class="grid-3" id="coursesGrid">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addCourseModal">
        <div class="modal" style="max-width:650px;">
            <div class="modal-header">
                <span class="modal-title"><i class="fas fa-book" style="color:var(--primary);margin-right:8px;"></i>
                    Create New Course</span>
                <button class="modal-close" onclick="closeModal('addCourseModal')"><i class="fas fa-times"></i></button>
            </div>
            <form id="addCourseForm">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="form-group col-span-2">
                        <label class="form-label">Course Title *</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Course Code *</label>
                        <input type="text" class="form-control" name="code" placeholder="e.g. CS-101" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select class="form-control" name="category" required>
                            <option value="academic">Academic (5th-10th)</option>
                            <option value="senior-secondary">Senior Secondary (11th-12th)</option>
                            <option value="computer">Computer & IT</option>
                        </select>
                    </div>
                    <div class="form-group col-span-2">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Monthly Fee (₹)</label>
                        <input type="number" class="form-control" name="monthlyFee" value="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Duration</label>
                        <input type="text" class="form-control" name="duration" placeholder="e.g. 6 Months, Year-round">
                    </div>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal('addCourseModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="addCourseBtn"><i class="fas fa-save"></i> Save
                        Course</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="assets/admin.js"></script>
    <script>
        requireAdmin();
        renderSidebarUser();

        async function loadCourses() {
            const cat = document.getElementById('categoryFilter').value;
            const act = document.getElementById('activeFilter').value;
            let q = '?';
            if (cat) q += `category=${cat}&`;
            if (act !== '') q += `isActive=${act}`;

            try {
                document.getElementById('coursesGrid').innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px;"><div class="spinner"></div></div>';
                const data = await apiCall(`/courses${q}`);

                if (!data.data.length) {
                    document.getElementById('coursesGrid').innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-box-open" style="font-size:2rem;margin-bottom:10px;display:block;"></i> No courses found.</div>';
                    return;
                }

                document.getElementById('coursesGrid').innerHTML = data.data.map(c => `
                <div class="card" style="opacity:${c.isActive ? 1 : 0.6}; transition:0.2s;">
                    <div style="height:60px;background:${c.colorGradient};display:flex;align-items:center;padding:0 20px;">
                        <i class="${c.icon}" style="font-size:1.5rem;color:#fff;"></i>
                    </div>
                    <div class="card-body">
                        <div style="font-family:var(--font-head);font-size:1.05rem;font-weight:700;margin-bottom:4px;color:#fff;">${c.title}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:12px;">Code: <span style="color:#fff;">${c.code}</span> • Cat: <span style="text-transform:capitalize;color:#fff;">${c.category}</span></div>
                        <div style="font-size:0.83rem;color:var(--text);margin-bottom:16px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${c.description || 'No description'}</div>
                        
                        <div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:14px;margin-bottom:14px;">
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);">Monthly Fee</div>
                                <div style="font-weight:700;color:var(--success);">${formatCurrency(c.monthlyFee)}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:0.7rem;color:var(--text-muted);">Enrolled</div>
                                <div style="font-weight:700;color:#fff;">${c.totalStudents} <i class="fas fa-users" style="font-size:0.8rem;color:var(--primary);"></i></div>
                            </div>
                        </div>
                        
                        <div style="display:flex;gap:8px;">
                            <button class="btn btn-outline btn-sm" style="flex:1;" onclick="toggleCourseActive('${c._id}', ${c.isActive})">${c.isActive ? 'Deactivate' : 'Activate'}</button>
                            <button class="btn btn-ghost btn-sm" onclick="deleteCourse('${c._id}')"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            } catch (err) { showToast(err.message, 'error'); }
        }

        async function toggleCourseActive(id, curr) {
            try {
                await apiCall(`/courses/${id}`, 'PUT', { isActive: !curr });
                loadCourses();
                showToast('Course status updated', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function deleteCourse(id) {
            if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
            try {
                await apiCall(`/courses/${id}`, 'DELETE');
                loadCourses();
                showToast('Course deleted', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        }

        document.getElementById('addCourseForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('addCourseBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Saving...';

            const body = Object.fromEntries(new FormData(this));
            body.monthlyFee = Number(body.monthlyFee) || 0;

            try {
                await apiCall('/courses', 'POST', body);
                showToast('Course created successfully!', 'success');
                closeModal('addCourseModal');
                this.reset();
                loadCourses();
            } catch (err) { showToast(err.message, 'error'); }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Save Course';
        });

        loadCourses();
    </script>
</body>

</html>
